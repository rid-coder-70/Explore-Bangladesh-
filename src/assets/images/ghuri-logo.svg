<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d89e5" />
      <stop offset="100%" stop-color="#1cb5e0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular background -->
  <circle cx="100" cy="100" r="90" fill="url(#mainGrad)" />
  
  <!-- "B" and Path Symbol combined -->
  <g transform="translate(105, 100) scale(0.85)">
    <!-- Path line -->
    <path d="M -60,0 C -60,-80 40,-80 40,0 C 40,80 -60,80 -60,0" 
          fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-dasharray="10 5" opacity="0.4"/>
    
    <!-- Stylized 'G' with Arrow -->
    <path d="M 0,-40 C 30,-40 50,-20 50,0 C 50,20 30,40 0,40 L -30,40 L -30,-40 Z" 
          fill="#ffffff" />
    <path d="M 50,0 L 70,-15 L 70,15 Z" fill="#ffffff" /> <!-- Forward Arrow -->
    
    <!-- Stylized 'B' -->
    <path d="M -50,-40 L -20,-40 C -10,-40 0,-35 0,-25 C 0,-15 -10,-10 -20,-10 L -50,-10 Z" fill="#ffffff" opacity="0.9" />
    <path d="M -50,-10 L -15,-10 C -5,-10 5,-5 5,5 C 5,15 -5,20 -15,20 L -50,20 Z" fill="#ffffff" opacity="0.9" />
  </g>
</svg>
